name: 量化投资简报

on:
  schedule:
    # 临时保留 GitHub Cron，全部往后挪 1 分钟错峰
    - cron: '38 0 * * 1-5'     # 08:38 BJT 早间（留给飞书 08:30 测试）
    - cron: '24 3 * * 1-5'     # 11:24 BJT 午间（照常运行）
    - cron: '18 6 * * 1-5'     # 14:18 BJT 收盘前（照常运行）
    - cron: '8 12 * * 1-5'     # 20:08 BJT 夜盘（照常运行）
    - cron: '38 0 * * 6'       # 周六 08:38
    - cron: '8 12 * * 0'       # 周日 20:08

  workflow_dispatch:
    inputs:
      mode:
        description: '手动运行模式'
        required: true
        default: 'closing'
        type: choice
        options:
          - morning
          - midday
          - closing
          - evening
          - sat_morning
          - sun_evening
          - notify

concurrency:
  group: quant-daily-run
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p data logs

      - name: 运行
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_TOKEN: ${{ secrets.FEISHU_BITABLE_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LOG_LEVEL: INFO
        run: |
          # ── 确定模式 ──
          MODE="${{ github.event.inputs.mode || '' }}"
          IS_FEISHU_TRIGGER="true"
          
          # 如果 MODE 为空，说明是 GitHub 内部的 Cron 触发的
          if [ -z "$MODE" ]; then
            IS_FEISHU_TRIGGER="false"
            HOUR=$(TZ='Asia/Shanghai' date '+%-H')
            DAY=$(TZ='Asia/Shanghai' date '+%u')   
            if [ "$DAY" = "6" ]; then MODE="sat_morning"
            elif [ "$DAY" = "7" ]; then MODE="sun_evening"
            elif [ "$HOUR" -ge 5 ] && [ "$HOUR" -lt 10 ]; then MODE="morning"
            elif [ "$HOUR" -ge 10 ] && [ "$HOUR" -lt 13 ]; then MODE="midday"
            elif [ "$HOUR" -ge 13 ] && [ "$HOUR" -lt 16 ]; then MODE="closing"
            else MODE="evening"
            fi
          fi

          echo "=========================================="
          echo "  AI 量化投资系统 (双轨测试版)"
          echo "=========================================="
          echo "北京时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "触发源: $( [ "$IS_FEISHU_TRIGGER" = "true" ] && echo "飞书自动化" || echo "GitHub Cron" )"
          echo "执行模式: $MODE"
          echo ""

          # 🏆 明早测试的核心补丁：如果当前是 GitHub 触发的早报，说明飞书刚刚已经跑过了，直接熔断不发！
          if [ "$IS_FEISHU_TRIGGER" = "false" ] && [ "$MODE" = "morning" ]; then
            echo "⏭️ 检测到这是 GitHub 自动重跑的早报，为了防止消息重复，已自动跳过推送。"
            # 但依然维护底层账本，确保不漏单
            python -m src.pending_resolver
            exit 0
          fi

          # ── Step 0: Pending 交易确认 ──
          python -m src.pending_resolver

          # ── Step 1: 按模式路由 ──
          case "$MODE" in
            notify) python -m src.notify ;;
            *) python -m src.briefing "$MODE" ;;
          esac